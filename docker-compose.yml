version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    profiles:
      - deploy
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - omnipark_net
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: omnipark_backend
    profiles:
      - deploy
    environment:
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      # Add other environment variables from server/.env here if needed
      # - MONGO_URI_OMNIPARK_ID_SYSTEM=mongodb+srv://...
      # - JWT_SECRET=...
      # - JWT_REFRESH_SECRET=...
    expose:
      - "${SERVER_PORT:-3000}"
    env_file:
      - ./server/.env
    networks:
      - omnipark_net
    depends_on:
      - mosquitto
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: omnipark_nginx
    profiles:
      - deploy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - omnipark_net
    depends_on:
      - backend
    restart: unless-stopped

networks:
  omnipark_net:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
