# ==============================================================================
# OmniPark ID System — Nginx Initial Config (HTTP-only for Certbot bootstrap)
# ==============================================================================
# This config is used ONLY during the first deployment to obtain SSL certificates.
# After certificates are obtained, nginx is reloaded with the full HTTPS config.
# ==============================================================================

server {
    listen 80;
    server_name DOMAIN_PLACEHOLDER;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Temporary: proxy to backend while waiting for SSL cert
    location / {
        return 200 'OmniPark ID System — waiting for SSL certificate...';
        add_header Content-Type text/plain;
    }
}
