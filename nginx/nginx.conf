# ==============================================================================
# OmniPark ID System — Nginx Reverse Proxy Configuration
# ==============================================================================
# HTTPS mode with Let's Encrypt (Certbot) SSL certificates
# Domain: DOMAIN_PLACEHOLDER
# ==============================================================================

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream backend_upstream {
    server backend:SERVER_PORT;
}

# =========================
# HTTP → HTTPS redirect
# =========================
server {
    listen 80;
    server_name DOMAIN_PLACEHOLDER;

    # Let's Encrypt ACME challenge (must be served over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name DOMAIN_PLACEHOLDER;

    # Let's Encrypt certificates
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Proxy to NestJS backend ───────────────────────────────────────────────
    location / {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── WebSocket support (Socket.IO) ─────────────────────────────────────────
    location /socket/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout (keep alive)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── File upload size limit ────────────────────────────────────────────────
    client_max_body_size 10M;
}
