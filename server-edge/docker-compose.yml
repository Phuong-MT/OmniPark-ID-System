version: '3.8'

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
      - "8189:8189"   # WebRTC TCP
      - "9997:9997"   # API
    volumes:
      - ./mediamtx.yml:/mediamtx.yml

  edge-api:
    build:
      context: ./edge-api
    container_name: edge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://host.docker.internal:3000
      - EDGE_NODE_ID=edge-default
      - CAMERA_REFRESH_INTERVAL_SECONDS=15
      - BACKEND_TIMEOUT_SECONDS=10
      - EVENT_FORWARD_RETRIES=3
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/status')"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      - mediamtx

  ai-service:
    build:
      context: ./ai-service
    container_name: ai-service
    restart: unless-stopped
    environment:
      - EDGE_API_URL=http://edge-api:8000
      - CAMERA_REFRESH_INTERVAL_SECONDS=10
      - TARGET_FPS=5
      - EVENT_DISPATCH_RETRIES=3
      - PLATE_DEBOUNCE_SECONDS=5
      - STREAM_RECONNECT_DELAY_SECONDS=3
      - STREAM_OPEN_TIMEOUT_MS=5000
      - STREAM_READ_TIMEOUT_MS=5000
    depends_on:
      edge-api:
        condition: service_healthy
