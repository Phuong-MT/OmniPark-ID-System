version: '3.8'

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
      - "8189:8189"   # WebRTC TCP
      - "9997:9997"   # API
    volumes:
      - ./mediamtx.yml:/mediamtx.yml

  edge-api:
    build:
      context: ./edge-api
    container_name: edge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://host.docker.internal:3000
    depends_on:
      - mediamtx

  ai-service:
    build:
      context: ./ai-service
    container_name: ai-service
    restart: unless-stopped
    environment:
      - MEDIAMTX_RTSP_URL=rtsp://mediamtx:8554/mystream
      - EDGE_API_URL=http://edge-api:8000
    depends_on:
      - mediamtx
      - edge-api
