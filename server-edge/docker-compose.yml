services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
      - "8189:8189"   # WebRTC TCP
      - "9997:9997"   # API
    volumes:
      - ./mediamtx.yml:/mediamtx.yml

  edge-api:
    build:
      context: ./edge-api
    container_name: edge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://host.docker.internal:3000
      - EDGE_NODE_ID=edge-default
      - EDGE_STANDALONE=${EDGE_STANDALONE:-true}
      - LOCAL_CAMERAS_JSON=${LOCAL_CAMERAS_JSON:-[]}
      - CAMERA_REFRESH_INTERVAL_SECONDS=15
      - BACKEND_TIMEOUT_SECONDS=10
      - EVENT_FORWARD_RETRIES=3
      - EDGE_API_KEY=${EDGE_API_KEY:-}
      - ONVIF_DISCOVERY_ENABLED=${ONVIF_DISCOVERY_ENABLED:-false}
      - ONVIF_DISCOVERY_INTERVAL_SECONDS=60
      - ONVIF_DISCOVERY_TIMEOUT_SECONDS=5
      - STREAM_MONITOR_INTERVAL_SECONDS=15
      - STREAM_OPEN_TIMEOUT_MS=5000
      - STREAM_READ_TIMEOUT_MS=5000
      - STREAM_PROBE_TIMEOUT_SECONDS=12
      - MAX_MONITORED_CAMERAS=10
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/status')"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      - mediamtx
